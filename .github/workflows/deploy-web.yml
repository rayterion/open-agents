name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Expo web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Validate EXPO_PUBLIC_API_URL
        run: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then
            echo "ERROR: EXPO_PUBLIC_API_URL secret is not set"
            echo "Please set it in: Settings → Secrets and variables → Actions → Repository secrets"
            echo "Expected value: https://your-api.onrender.com (without /api/v1 suffix)"
            exit 1
          fi
          echo "✓ EXPO_PUBLIC_API_URL is configured"
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}

      - name: Export Expo web app
        working-directory: apps/mobile
        env:
          # Point the web app at your Render API — set this secret in
          # GitHub → Settings → Secrets → Actions → EXPO_PUBLIC_API_URL
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npx expo export --platform web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/mobile/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
